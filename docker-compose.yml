# 腾讯云：单台云服务器上一键起前后端（Nginx 静态 + 反代 FastAPI）
# 文档见 README「部署上线（腾讯云）」

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://127.0.0.1}
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: deployment/tencent/Dockerfile.web
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - api
    restart: unless-stopped
