# Render Blueprint：https://render.com/docs/blueprint-spec
# 在 Render 控制台「New」→「Blueprint」连接本仓库后按提示填写密钥类环境变量。

services:
  - type: web
    name: fortune-analysis-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    envVars:
      - key: FRONTEND_ORIGINS
        sync: false
      - key: LLM_PROVIDER
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        sync: false
      - key: DEEPSEEK_MODEL
        sync: false
      - key: KIMI_API_KEY
        sync: false
      - key: KIMI_BASE_URL
        sync: false
      - key: KIMI_MODEL
        sync: false
