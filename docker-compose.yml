# 腾讯云轻量应用服务器（Lighthouse）或 CVM：单机 Docker Compose（Nginx + FastAPI）

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://127.0.0.1}
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: deployment/tencent/Dockerfile.web
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - api
    restart: unless-stopped
